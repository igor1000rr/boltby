# /etc/wireguard/wg0.conf — VPS (сервер)
#
# 1. Сгенерируй ключи:
#    wg genkey | tee /etc/wireguard/server_private.key | wg pubkey > /etc/wireguard/server_public.key
#
# 2. Замени <SERVER_PRIVATE_KEY> и <GPU_PUBLIC_KEY>
#
# 3. Запусти:
#    systemctl enable --now wg-quick@wg0
#    ufw allow 51820/udp

[Interface]
Address = 10.7.0.1/24
ListenPort = 51820
PrivateKey = <SERVER_PRIVATE_KEY>

# Forwarding (если GPU нужен доступ в интернет через VPS)
# PostUp = iptables -A FORWARD -i wg0 -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
# PostDown = iptables -D FORWARD -i wg0 -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE

# GPU Node 1
[Peer]
PublicKey = <GPU_PUBLIC_KEY>
AllowedIPs = 10.7.0.2/32

# GPU Node 2 (при необходимости)
# [Peer]
# PublicKey = <GPU2_PUBLIC_KEY>
# AllowedIPs = 10.7.0.3/32
