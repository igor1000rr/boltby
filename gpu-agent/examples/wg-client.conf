# /etc/wireguard/wg0.conf — GPU машина (клиент)
#
# Этот конфиг создаётся автоматически через Agent UI.
# Используй этот пример если настраиваешь вручную.
#
# 1. Сгенерируй ключи:
#    wg genkey | tee /etc/wireguard/gpu_private.key | wg pubkey > /etc/wireguard/gpu_public.key
#
# 2. Замени <GPU_PRIVATE_KEY>, <VPS_PUBLIC_KEY>, <VPS_IP>
#
# 3. Добавь GPU public key в wg0.conf на VPS (см. wg-server.conf)
#
# 4. Запусти:
#    systemctl enable --now wg-quick@wg0

[Interface]
Address = 10.7.0.2/24
PrivateKey = <GPU_PRIVATE_KEY>

[Peer]
PublicKey = <VPS_PUBLIC_KEY>
Endpoint = <VPS_IP>:51820
AllowedIPs = 10.7.0.1/32
PersistentKeepalive = 25
